name: 毎週日曜日に音楽リストを更新

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜日 午前9時（日本時間）
  workflow_dispatch:      # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 音楽リストを生成
        run: python fetch_music.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: 音楽リストを自動更新 $(date +'%Y-%m-%d')"
          git push
